<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0A1628"/>
  <text x="7" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#00B4D8" letter-spacing="-1">L</text>
