<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Stylised L in teal -->
  <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="#00B4D8" letter-spacing="-4">L</text>
  <!-- uris in white -->
  <text x="48" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="600" fill="#FFFFFF" letter-spacing="-3">uris</text>
  <!-- Accent underline extending from L base -->
  <rect x="0" y="88" width="260" height="3" rx="1.5" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
